<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visa Payment</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f8f4ef; color: #2f241b; margin: 0; padding: 24px; }
      .card { max-width: 560px; margin: 40px auto; background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
      .btn { display: inline-block; margin-top: 16px; padding: 12px 16px; background: #1a1f71; color: white; border: none; border-radius: 10px; text-decoration: none; cursor: pointer; }
      input { width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Visa / Card Checkout</h2>
      <p>Complete your payment securely with Visa or card.</p>
      <label>Card Number</label>
      <input id="cardNumber" placeholder="4242 4242 4242 4242" />
      <label>Expiry</label>
      <input id="expiry" placeholder="MM/YY" />
      <label>CVV</label>
      <input id="cvv" placeholder="123" />
      <label>Amount</label>
      <input id="amount" readonly />
      <button class="btn" onclick="completePayment()">Pay with Card</button>
      <p id="status" style="margin-top: 12px;"></p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code') || '';
      const amount = params.get('amount') || '';
      const currency = params.get('currency') || 'UGX';
      const fractionDigits = currency === 'UGX' || currency === 'JPY' ? 0 : 2;
      document.getElementById('amount').value = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency,
        minimumFractionDigits: fractionDigits,
        maximumFractionDigits: fractionDigits,
      }).format(Number(amount));
      async function completePayment() {
        const cardNumber = document.getElementById('cardNumber').value.trim();
        if (!cardNumber) {
          document.getElementById('status').textContent = 'Please enter your card number.';
          return;
        }
        document.getElementById('status').textContent = 'Preparing card payment...';
        const response = await fetch(`/api/bookings/${code}/pay`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentMethod: 'visa', paymentReference: `VS-${Date.now()}`, cardNumber, amount: Number(amount), currency })
        });
        const data = await response.json();
        if (response.ok && data.checkoutUrl) {
          window.location.href = data.checkoutUrl;
        } else if (response.ok) {
          document.getElementById('status').textContent = `Payment received. Reference: ${data.booking.paymentReference}`;
        } else {
          document.getElementById('status').textContent = data.error || 'Payment failed.';
        }
      }
    </script>
  </body>
</html>
