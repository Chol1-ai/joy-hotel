<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayPal Payment</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f8f4ef; color: #2f241b; margin: 0; padding: 24px; }
      .card { max-width: 560px; margin: 40px auto; background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
      .btn { display: inline-block; margin-top: 16px; padding: 12px 16px; background: #0070ba; color: white; border: none; border-radius: 10px; text-decoration: none; cursor: pointer; }
      input { width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>PayPal Checkout</h2>
      <p>Complete your payment securely with PayPal.</p>
      <label>PayPal Email</label>
      <input id="email" placeholder="you@example.com" />
      <label>Amount</label>
      <input id="amount" readonly />
      <button class="btn" onclick="completePayment()">Pay with PayPal</button>
      <p id="status" style="margin-top: 12px;"></p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code') || '';
      const amount = params.get('amount') || '';
      const currency = params.get('currency') || 'UGX';
      const fractionDigits = currency === 'UGX' || currency === 'JPY' ? 0 : 2;
      document.getElementById('amount').value = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency,
        minimumFractionDigits: fractionDigits,
        maximumFractionDigits: fractionDigits,
      }).format(Number(amount));
      async function completePayment() {
        const email = document.getElementById('email').value.trim();
        if (!email) {
          document.getElementById('status').textContent = 'Please enter your PayPal email.';
          return;
        }
        document.getElementById('status').textContent = 'Preparing PayPal payment...';
        const response = await fetch(`/api/bookings/${code}/pay`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentMethod: 'paypal', paymentReference: `PP-${Date.now()}`, email, amount: Number(amount), currency })
        });
        const data = await response.json();
        if (response.ok && data.checkoutUrl) {
          window.location.href = data.checkoutUrl;
        } else if (response.ok) {
          document.getElementById('status').textContent = `Payment received. Reference: ${data.booking.paymentReference}`;
        } else {
          document.getElementById('status').textContent = data.error || 'Payment failed.';
        }
      }
    </script>
  </body>
</html>
