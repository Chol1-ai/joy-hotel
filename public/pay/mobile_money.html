<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Money Payment</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f8f4ef; color: #2f241b; margin: 0; padding: 24px; }
      .card { max-width: 560px; margin: 40px auto; background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
      .btn { display: inline-block; margin-top: 16px; padding: 12px 16px; background: #b58b3a; color: white; border: none; border-radius: 10px; text-decoration: none; cursor: pointer; }
      input { width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Mobile Money Checkout</h2>
      <p>Complete your payment securely with Mobile Money.</p>
      <label>Phone Number</label>
      <input id="phone" placeholder="e.g. +256700000000" />
      <label>Amount</label>
      <input id="amount" readonly />
      <button class="btn" onclick="completePayment()">Pay Now</button>
      <p id="status" style="margin-top: 12px;"></p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code') || '';
      const amount = params.get('amount') || '';
      document.getElementById('amount').value = Number(amount).toLocaleString('en-UG') + ' UGX';
      async function completePayment() {
        const phone = document.getElementById('phone').value.trim();
        if (!phone) {
          document.getElementById('status').textContent = 'Please enter your phone number.';
          return;
        }
        const response = await fetch(`/api/bookings/${code}/pay`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentMethod: 'mobile_money', paymentReference: `MM-${Date.now()}` })
        });
        const data = await response.json();
        document.getElementById('status').textContent = response.ok ? `Payment received. Reference: ${data.booking.paymentReference}` : data.error || 'Payment failed.';
      }
    </script>
  </body>
</html>
